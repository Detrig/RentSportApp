services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app1
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      NODE_NAME: Нода 1

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app2
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      NODE_NAME: Нода 2

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app3
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      NODE_NAME: Нода 3

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3